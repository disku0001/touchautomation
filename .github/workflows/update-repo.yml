name: Update Repository

on:
  push:
    branches: [main]
    paths:
      - 'pool/**'
      - 'meta/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev bzip2 xz-utils

      - name: Run update-repo.sh
        run: |
          chmod +x scripts/update-repo.sh
          bash scripts/update-repo.sh

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Packages Packages.bz2 Packages.xz Release depictions/ pool/
          git diff --cached --quiet || git commit -m "Auto-update repo metadata"
          git push
