<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - TouchAutomation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; padding: 16px; }
        .banner { width: 100%; border-radius: 12px; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 16px; }
        .desc { line-height: 1.6; margin-bottom: 24px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .info-label { color: #888; }
    </style>
</head>
<body>
    <h1>{{NAME}}</h1>
    <p class="meta">by {{DEVELOPER}} &bull; v{{VERSION}}</p>
    <div class="desc">{{DESCRIPTION}}</div>
    <div class="info-row"><span class="info-label">Compatibility</span><span>{{COMPATIBILITY}}</span></div>
    <div class="info-row"><span class="info-label">Section</span><span>{{SECTION}}</span></div>
    <div class="info-row"><span class="info-label">Version</span><span>{{VERSION}}</span></div>
</body>
</html>
